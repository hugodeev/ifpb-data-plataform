<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.5s ease;
}

.modal-content {
    background: white;
    border-radius: 10px;
    padding: 2rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}


    </style>
</head>
<body>
    
<!-- Overlay de Carregamento -->
<div id="loading-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 500px; text-align: center; padding: 3rem 2rem;">
        <div style="width: 80px; height: 80px; border: 4px solid #f3f3f3; border-top: 4px solid var(--secondary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 2rem;"></div>
        <h3 style="color: var(--dark-color); margin-bottom: 1rem;">Carregando Dados...</h3>
        <p style="color: var(--medium-color); margin-bottom: 1.5rem;" id="loading-message">Inicializando sistema e buscando informações</p>
        <div style="height: 6px; background: var(--light-color); border-radius: 3px; overflow: hidden;">
            <div id="loading-progress" style="height: 100%; background: linear-gradient(90deg, var(--secondary-color), var(--primary-color)); width: 0%; transition: width 0.3s ease;"></div>
        </div>
    </div>
</div>


    <script>

// ===== SISTEMA DE CARREGAMENTO =====
function showLoading(message = 'Carregando dados...') {
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingMessage = document.getElementById('loading-message');
    const loadingProgress = document.getElementById('loading-progress');
    
    if (loadingOverlay && loadingMessage && loadingProgress) {
        loadingMessage.textContent = message;
        loadingProgress.style.width = '0%';
        loadingOverlay.style.display = 'flex';
        
        // Animar progresso
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 10;
            if (progress > 90) {
                clearInterval(interval);
                loadingProgress.style.width = '90%';
            } else {
                loadingProgress.style.width = `${progress}%`;
            }
        }, 200);
    }
}

function updateLoadingProgress(progress) {
    const loadingProgress = document.getElementById('loading-progress');
    if (loadingProgress) {
        loadingProgress.style.width = `${progress}%`;
    }
}

function hideLoading() {
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingProgress = document.getElementById('loading-progress');
    
    if (loadingProgress) {
        loadingProgress.style.width = '100%';
    }
    
    setTimeout(() => {
        if (loadingOverlay) {
            loadingOverlay.style.display = 'none';
        }
    }, 500);
}

    </script>
</body>
</html>
